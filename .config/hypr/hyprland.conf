source=/home/skeken/.config/hypr/binds.conf 

# --- MONITORS ---
# syntax: monitor=name,resolution,position,scale
# Use "hyprctl monitors" to find your name.
monitor=,preferred,auto,1

# --- AUTOSTART ---
# Execute your essential apps at launch
exec-once = waybar
#exec-once = hyprpaper
exec-once = swww-daemon

# Restore the last pywal theme and wallpaper automatically
exec-once = wal -R && hyprctl hyprpaper preload "$(cat ~/.cache/wal/wal)" && hyprctl hyprpaper wallpaper "eDP-1,$(cat ~/.cache/wal/wal)"

#exec-once = /usr/lib/polkit-kde-authentication-agent-1

# --- SETTINGS ---
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle # Options: dwindle or master
}

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10

    border_size = 1

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(121212ee) rgba(e8eaedee) 45deg
    col.inactive_border = rgba(595959aa)
 
    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false 

    # Please see https://wiki.hyprland.org/Configuring/Tiling-Portal/ for more
    layout = master
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.9

    # https://wiki.hyprland.org/Configuring/Variables/#blur
blur {
    enabled = true
    size = 3
    passes = 1
        
    vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. 
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl on error/boot screens
}
